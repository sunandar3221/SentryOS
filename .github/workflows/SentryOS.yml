name: Build SentryOS (Cubic Style - Base Debian)

on:
  workflow_dispatch: # Jalankan manual lewat tombol

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools Pendukung (Sistem Cubic CLI)
        run: |
          sudo apt update
          sudo apt install -y squashfs-tools xorriso chafa curl isolinux syslinux-common wget dbus

      - name: Download ISO Debian Asli (Base OS Trixie XFCE)
        run: |
          wget -qO debian-base.iso "https://cdimage.debian.org/cdimage/weekly-live-builds/amd64/iso-hybrid/debian-live-testing-amd64-xfce.iso"

      - name: Bongkar ISO & SquashFS (Fase Extract Cubic)
        run: |
          sudo mkdir -p /tmp/iso_unpacked /tmp/sentryos-root
          sudo xorriso -osirrox on -indev debian-base.iso -extract / /tmp/iso_unpacked
          sudo unsquashfs -f -d /tmp/sentryos-root /tmp/iso_unpacked/live/filesystem.squashfs

      - name: Masuk Chroot & Pasang SentryOS (Sistem Anti-Root & Auto-Login)
        run: |
          sudo mount -t proc none /tmp/sentryos-root/proc
          sudo mount -t sysfs none /tmp/sentryos-root/sys
          sudo mount -o bind /dev /tmp/sentryos-root/dev
          sudo mount -o bind /dev/pts /tmp/sentryos-root/dev/pts
          sudo cp /etc/resolv.conf /tmp/sentryos-root/etc/

          sudo chroot /tmp/sentryos-root /bin/bash -c "
            # 1. Kunci Hostname jadi sentryos (Anti Bocor)
            echo 'sentryos' > /etc/hostname
            echo '127.0.0.1 localhost sentryos' > /etc/hosts
            
            # 2. Bersihin identitas mesin GitHub
            rm -f /etc/machine-id
            rm -f /var/lib/dbus/machine-id
            dbus-uuidgen --ensure=/etc/machine-id
            
            # 3. Ganti identitas OS Debian
            cat <<EOF > /etc/os-release
            PRETTY_NAME=\"SentryOS\"
            NAME=\"SentryOS\"
            ID=sentryos
            ID_LIKE=debian
          EOF

            # 4. EKSEKUSI ANTI-ROOT (Kunci Root & Hapus Sudo)
            passwd -l root
            apt-get remove --purge sudo -y
            
            # 5. PAKSA AUTO-LOGIN TANPA SUDO
            mkdir -p /etc/lightdm/lightdm.conf.d
            cat <<EOF > /etc/lightdm/lightdm.conf.d/99-autologin.conf
            [Seat:*]
            autologin-user=user
            autologin-user-timeout=0
            user-session=xfce
          EOF

            # 6. BIKIN ATURAN POLKIT (Bypass APT & Installer)
            # Karena gak ada sudo, ini nyawa biar lu tetep bisa install aplikasi & install OS ke PC
            mkdir -p /usr/share/polkit-1/rules.d/
            cat <<EOF > /usr/share/polkit-1/rules.d/45-sentryos-bypass.rules
            polkit.addRule(function(action, subject) {
                if (action.id == 'org.debian.apt.install-or-remove-packages' || 
                    action.id == 'com.github.calamares.calamares.pkexec') {
                    return polkit.Result.YES;
                }
            });
          EOF

            # 7. Install Calamares Installer
            apt-get update
            apt-get install -y calamares calamares-settings-debian --no-install-recommends
          "

      - name: Pasang Logo SentryOS & Branding Custom
        run: |
          sudo curl -L -o /tmp/sentryos-root/tmp/logo.png "https://drive.google.com/uc?export=download&id=1QJ__X3bZmA5j7VQX17rit_EV1eQNAkKY"
          sudo chroot /tmp/sentryos-root /bin/bash -c "chafa --format=symbols --size=40x /tmp/logo.png > /etc/distro-logo.txt"
          
          sudo mkdir -p /tmp/sentryos-root/usr/share/calamares/branding/sentryos
          sudo cp /tmp/sentryos-root/tmp/logo.png /tmp/sentryos-root/usr/share/calamares/branding/sentryos/logo.png
          
          sudo bash -c 'cat <<EOF > /tmp/sentryos-root/usr/share/calamares/branding/sentryos/branding.desc
          ---
          componentName: sentryos
          windowExpanding: normal
          windowSize: 800px,520px
          windowPlacement: center
          sidebar: widget
          navigation: widget
          strings:
              productName: SentryOS
              shortProductName: SentryOS
              version: 1.0
              shortVersion: 1.0
              versionedName: SentryOS 1.0
              shortVersionedName: SentryOS 1.0
              bootloaderEntryName: SentryOS
          images:
              productLogo: "logo.png"
              productIcon: "logo.png"
              productWelcome: "logo.png"
          EOF'
          
          sudo sed -i 's/branding: .*/branding: sentryos/g' /tmp/sentryos-root/etc/calamares/settings.conf || true

      - name: Bersih-bersih & Unmount
        run: |
          sudo rm /tmp/sentryos-root/etc/resolv.conf
          sudo umount /tmp/sentryos-root/dev/pts
          sudo umount /tmp/sentryos-root/dev
          sudo umount /tmp/sentryos-root/sys
          sudo umount /tmp/sentryos-root/proc

      - name: Bungkus Ulang OS (Fase Build Cubic)
        run: |
          sudo rm /tmp/iso_unpacked/live/filesystem.squashfs
          sudo mksquashfs /tmp/sentryos-root /tmp/iso_unpacked/live/filesystem.squashfs -comp xz

          cd /tmp/iso_unpacked
          sudo bash -c "md5sum \$(find ! -name 'md5sum.txt' ! -path './isolinux/*' -follow -type f) > md5sum.txt"

          sudo xorriso -as mkisofs -r -J -joliet-long -l \
            -isohybrid-mbr /usr/lib/ISOLINUX/isohdpfx.bin \
            -c isolinux/boot.cat -b isolinux/isolinux.bin \
            -no-emul-boot -boot-load-size 4 -boot-info-table \
            -o /tmp/sentryos-1.0.iso .

      - name: Upload ISO SentryOS
        uses: actions/upload-artifact@v4
        with:
          name: SentryOS-ISO
          path: /tmp/sentryos-1.0.iso
