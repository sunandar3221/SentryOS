name: Build SentryOS (Debian 13 Trixie Custom)

on:
  workflow_dispatch: # Jalankan manual lewat tombol di web GitHub

jobs:
  build-iso:
    runs-on: ubuntu-latest # Menggunakan server superkomputer GitHub
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools Pendukung Di Server GitHub
        run: |
          sudo apt update
          sudo apt install -y debootstrap squashfs-tools xorriso live-build chafa curl isolinux syslinux-common

      - name: Ambil Base Debian 13 (Bootstrap)
        run: |
          sudo mkdir -p /tmp/sentryos-root
          # Menarik sistem inti Debian 13 (Trixie) kosongan
          sudo debootstrap --arch=amd64 trixie /tmp/sentryos-root http://deb.debian.org/debian/

      - name: Setup Mount Point & Oprek Sistem
        run: |
          # Mount file system penting biar apt & chroot jalan mulus tanpa error
          sudo mount -t proc none /tmp/sentryos-root/proc
          sudo mount -t sysfs none /tmp/sentryos-root/sys
          sudo mount -o bind /dev /tmp/sentryos-root/dev
          sudo mount -o bind /dev/pts /tmp/sentryos-root/dev/pts

          # 1. Kunci Akun Root
          sudo chroot /tmp/sentryos-root passwd -l root
          
          # 2. Hapus Sudo
          sudo chroot /tmp/sentryos-root apt-get remove --purge sudo -y
          
          # 3. Buat Aturan Polkit buat APT (Bypass install paket untuk user biasa)
          sudo mkdir -p /tmp/sentryos-root/usr/share/polkit-1/rules.d/
          sudo bash -c 'cat <<EOF > /tmp/sentryos-root/usr/share/polkit-1/rules.d/45-allow-apt.rules
          polkit.addRule(function(action, subject) {
              if (action.id == "org.debian.apt.install-or-remove-packages") {
                  return polkit.Result.YES;
              }
          });
          EOF'

          # 4. Ganti identitas OS jadi SentryOS sepenuhnya
          sudo bash -c 'cat <<EOF > /tmp/sentryos-root/etc/os-release
          PRETTY_NAME="SentryOS"
          NAME="SentryOS"
          ID=sentryos
          ID_LIKE=debian
          EOF'

      - name: Pasang Kernel, GUI XFCE & Calamares Installer
        run: |
          sudo chroot /tmp/sentryos-root apt-get update
          # Memasang Kernel Linux, systemd, desktop XFCE, dan Calamares
          sudo chroot /tmp/sentryos-root apt-get install -y linux-image-amd64 systemd-sysv xorg xfce4 lightdm calamares calamares-settings-debian live-boot --no-install-recommends

      - name: Pasang Logo SentryOS & Custom Installer Calamares
        run: |
          # Download gambar lu dari GDrive pake URL Direct Download
          sudo curl -L -o /tmp/sentryos-root/tmp/logo.png "https://drive.google.com/uc?export=download&id=1QJ__X3bZmA5j7VQX17rit_EV1eQNAkKY"
          
          # Bikin ASCII buat terminal pakai logo lu (Fixed Permission Denied bug pake sudo tee)
          sudo chroot /tmp/sentryos-root chafa --format=symbols --size=40x /tmp/logo.png | sudo tee /tmp/sentryos-root/etc/distro-logo.txt > /dev/null
          
          # Bikin konfigurasi branding Calamares khusus SentryOS
          sudo mkdir -p /tmp/sentryos-root/usr/share/calamares/branding/sentryos
          sudo cp /tmp/sentryos-root/tmp/logo.png /tmp/sentryos-root/usr/share/calamares/branding/sentryos/logo.png
          
          sudo bash -c 'cat <<EOF > /tmp/sentryos-root/usr/share/calamares/branding/sentryos/branding.desc
          ---
          componentName: sentryos
          windowExpanding: normal
          windowSize: 800px,520px
          windowPlacement: center
          sidebar: widget
          navigation: widget
          strings:
              productName: SentryOS
              shortProductName: SentryOS
              version: 1.0
              shortVersion: 1.0
              versionedName: SentryOS 1.0
              shortVersionedName: SentryOS 1.0
              bootloaderEntryName: SentryOS
          images:
              productLogo: "logo.png"
              productIcon: "logo.png"
              productWelcome: "logo.png"
          EOF'
          
          # Timpa settingan asli Debian biar pakai branding SentryOS di installer
          sudo sed -i 's/branding: .*/branding: sentryos/g' /tmp/sentryos-root/etc/calamares/settings.conf || true

      - name: Unmount System Files (Penting)
        run: |
          # Wajib di-unmount sebelum dibungkus jadi squashfs biar OS gak bengkak/error
          sudo umount /tmp/sentryos-root/dev/pts
          sudo umount /tmp/sentryos-root/dev
          sudo umount /tmp/sentryos-root/sys
          sudo umount /tmp/sentryos-root/proc

      - name: Siapkan Struktur Booting Live USB
        run: |
          sudo mkdir -p /tmp/sentryos-iso/live
          sudo mkdir -p /tmp/sentryos-iso/isolinux
          
          # Kompres OS yang udah dioprek jadi SquashFS
          sudo mksquashfs /tmp/sentryos-root /tmp/sentryos-iso/live/filesystem.squashfs -comp gzip
          
          # Salin Kernel dan Initrd
          sudo cp /tmp/sentryos-root/boot/vmlinuz-* /tmp/sentryos-iso/live/vmlinuz
          sudo cp /tmp/sentryos-root/boot/initrd.img-* /tmp/sentryos-iso/live/initrd
          
          # Copy file system pembantu boot
          sudo cp /usr/lib/ISOLINUX/isolinux.bin /tmp/sentryos-iso/isolinux/
          sudo cp /usr/lib/syslinux/modules/bios/ldlinux.c32 /tmp/sentryos-iso/isolinux/
          
          # Bikin menu boot super simpel
          sudo bash -c 'cat <<EOF > /tmp/sentryos-iso/isolinux/isolinux.cfg
          default linux
          label linux
            kernel /live/vmlinuz
            append initrd=/live/initrd boot=live quiet splash
          EOF'

      - name: Bungkus Jadi File ISO Matang SentryOS
        run: |
          sudo xorriso -as mkisofs -r -J -joliet-long -l \
            -b isolinux/isolinux.bin -c isolinux/boot.cat \
            -no-emul-boot -boot-load-size 4 -boot-info-table \
            -o sentryos-1.0.iso /tmp/sentryos-iso

      - name: Upload ISO Hasil Rakitan
        uses: actions/upload-artifact@v4
        with:
          name: SentryOS-ISO
          path: sentryos-1.0.iso
