name: Build SentryOS (Pure Debootstrap - Super Slim)

on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools Pendukung
        run: |
          sudo apt update
          sudo apt install -y debootstrap squashfs-tools xorriso chafa curl isolinux syslinux-common syslinux-utils dbus

      - name: Bangun Fondasi SentryOS dari Nol (Debootstrap)
        run: |
          sudo mkdir -p /tmp/sentryos-root
          sudo debootstrap --arch=amd64 trixie /tmp/sentryos-root http://deb.debian.org/debian/

      - name: Rakit Mesin, GUI, & Sistem Keamanan (Chroot via Script)
        run: |
          sudo mount -t proc none /tmp/sentryos-root/proc
          sudo mount -t sysfs none /tmp/sentryos-root/sys
          sudo mount -o bind /dev /tmp/sentryos-root/dev
          sudo mount -o bind /dev/pts /tmp/sentryos-root/dev/pts
          sudo mount -t tmpfs tmpfs /tmp/sentryos-root/run
          sudo cp /etc/resolv.conf /tmp/sentryos-root/etc/

          cat << 'EOF' | sudo tee /tmp/sentryos-root/install-sentryos.sh > /dev/null
          #!/bin/bash
          set -e
          export DEBIAN_FRONTEND=noninteractive
          export DEBCONF_NONINTERACTIVE_SEEN=true

          echo -e '#!/bin/sh\nexit 101' > /usr/sbin/policy-rc.d
          chmod +x /usr/sbin/policy-rc.d

          # 0. Persiapan Lingkungan Chroot
          ln -sf /proc/mounts /etc/mtab
          echo "proc /proc proc defaults 0 0" > /etc/fstab

          cat <<CONF > /etc/kernel-img.conf
          do_symlinks = yes
          do_bootloader = no
          do_initrd = yes
          link_in_boot = no
          CONF

          cat <<REPO > /etc/apt/sources.list
          deb http://deb.debian.org/debian trixie main contrib non-free non-free-firmware
          REPO

          apt-get update
          apt-get install -y dbus initramfs-tools ca-certificates debconf-utils

          echo "grub-pc grub-pc/install_devices empty" | debconf-set-selections
          echo "grub-pc grub-pc/install_devices_empty boolean true" | debconf-set-selections
          
          # 1. Kunci Identitas
          echo 'sentryos' > /etc/hostname
          echo '127.0.0.1 localhost sentryos' > /etc/hosts
          mkdir -p /var/lib/dbus
          rm -f /etc/machine-id /var/lib/dbus/machine-id
          dbus-uuidgen --ensure=/etc/machine-id
          
          cat <<OSREL > /etc/os-release
          PRETTY_NAME="SentryOS"
          NAME="SentryOS"
          ID=sentryos
          ID_LIKE=debian
          OSREL

          # 2. Pasang Kernel & Base System
          apt-get install -y linux-image-amd64 linux-headers-amd64 firmware-linux live-boot live-config live-config-systemd systemd-sysv
          
          # Pasang GUI & Installer
          apt-get install -y xorg xfce4 xfce4-terminal lightdm calamares calamares-settings-debian pkexec network-manager grub-pc grub-efi-amd64-bin

          KVER=$(ls /lib/modules | grep -v "lost+found" | head -n 1)
          if [ -n "$KVER" ]; then
              update-initramfs -c -k "$KVER" || true
          fi

          # 3. Sistem Anti-Root
          passwd -l root
          export SUDO_FORCE_REMOVE=yes
          apt-get remove --purge sudo -y

          # 4. FIX BUG CALAMARES MINTA ROOT (VERSI ABSOLUT)
          mkdir -p /etc/polkit-1/rules.d/
          cat <<POLKIT > /etc/polkit-1/rules.d/10-sentryos-calamares.rules
          polkit.addRule(function(action, subject) {
              if (action.id == 'com.github.calamares.calamares.pkexec' ||
                  action.id == 'com.github.calamares.calamares' ||
                  (action.id == 'org.freedesktop.policykit.exec' && 
                  (action.lookup('program') == '/usr/bin/calamares' || action.lookup('program') == '/usr/sbin/calamares'))) {
                  return polkit.Result.YES;
              }
          });
          POLKIT

          mkdir -p /usr/share/polkit-1/actions
          cat <<POLICY2 > /usr/share/polkit-1/actions/com.sentryos.calamares.policy
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE policyconfig PUBLIC "-//freedesktop//DTD PolicyKit Policy Configuration 1.0//EN" "http://www.freedesktop.org/standards/PolicyKit/1/policyconfig.dtd">
          <policyconfig>
            <action id="com.sentryos.calamares.sbin">
              <defaults><allow_any>yes</allow_any><allow_inactive>yes</allow_inactive><allow_active>yes</allow_active></defaults>
              <annotate key="org.freedesktop.policykit.exec.path">/usr/sbin/calamares</annotate>
              <annotate key="org.freedesktop.policykit.exec.allow_gui">true</annotate>
            </action>
            <action id="com.sentryos.calamares.bin">
              <defaults><allow_any>yes</allow_any><allow_inactive>yes</allow_inactive><allow_active>yes</allow_active></defaults>
              <annotate key="org.freedesktop.policykit.exec.path">/usr/bin/calamares</annotate>
              <annotate key="org.freedesktop.policykit.exec.allow_gui">true</annotate>
            </action>
          </policyconfig>
          POLICY2

          echo '#!/bin/bash' > /usr/local/bin/install-sentryos
          echo 'if [ -f /usr/sbin/calamares ]; then' >> /usr/local/bin/install-sentryos
          echo '  pkexec /usr/sbin/calamares' >> /usr/local/bin/install-sentryos
          echo 'elif [ -f /usr/bin/calamares ]; then' >> /usr/local/bin/install-sentryos
          echo '  pkexec /usr/bin/calamares' >> /usr/local/bin/install-sentryos
          echo 'fi' >> /usr/local/bin/install-sentryos
          chmod +x /usr/local/bin/install-sentryos

          # 5. FIX BUG APT (SentryOS APT Wrapper via Polkit)
          mkdir -p /usr/share/polkit-1/actions
          cat <<POLICY > /usr/share/polkit-1/actions/com.sentryos.apt.policy
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE policyconfig PUBLIC "-//freedesktop//DTD PolicyKit Policy Configuration 1.0//EN" "http://www.freedesktop.org/standards/PolicyKit/1/policyconfig.dtd">
          <policyconfig>
            <action id="com.sentryos.apt">
              <defaults><allow_any>yes</allow_any><allow_inactive>yes</allow_inactive><allow_active>yes</allow_active></defaults>
              <annotate key="org.freedesktop.policykit.exec.path">/usr/bin/apt</annotate>
            </action>
            <action id="com.sentryos.apt-get">
              <defaults><allow_any>yes</allow_any><allow_inactive>yes</allow_inactive><allow_active>yes</allow_active></defaults>
              <annotate key="org.freedesktop.policykit.exec.path">/usr/bin/apt-get</annotate>
            </action>
          </policyconfig>
          POLICY

          echo '#!/bin/bash' > /usr/local/bin/apt
          echo 'pkexec /usr/bin/apt "$@"' >> /usr/local/bin/apt
          chmod +x /usr/local/bin/apt

          echo '#!/bin/bash' > /usr/local/bin/apt-get
          echo 'pkexec /usr/bin/apt-get "$@"' >> /usr/local/bin/apt-get
          chmod +x /usr/local/bin/apt-get

          # 6. Bersih-bersih Sampah Ekstrem
          /usr/bin/apt-get clean
          rm -rf /var/lib/apt/lists/* /tmp/* /var/tmp/* /var/log/* /usr/share/doc/* /usr/share/man/* /usr/share/locale/*
          
          rm -f /usr/sbin/policy-rc.d
          EOF

          sudo chmod +x /tmp/sentryos-root/install-sentryos.sh
          sudo chroot /tmp/sentryos-root /install-sentryos.sh
          sudo rm -f /tmp/sentryos-root/install-sentryos.sh

      - name: Pasang Logo & Fix Bug Branding Calamares
        run: |
          sudo mkdir -p /tmp/sentryos-root/usr/share/pixmaps
          sudo curl -L -o /tmp/sentryos-root/usr/share/pixmaps/sentryos-logo.png "https://drive.google.com/uc?export=download&id=1QJ__X3bZmA5j7VQX17rit_EV1eQNAkKY"
          
          chafa --format=symbols --size=40x /tmp/sentryos-root/usr/share/pixmaps/sentryos-logo.png | sudo tee /tmp/sentryos-root/etc/distro-logo.txt > /dev/null
          
          sudo mkdir -p /tmp/sentryos-root/usr/share/calamares/branding/sentryos
          sudo cp /tmp/sentryos-root/usr/share/pixmaps/sentryos-logo.png /tmp/sentryos-root/usr/share/calamares/branding/sentryos/logo.png
          
          sudo bash -c 'cat <<EOF > /tmp/sentryos-root/usr/share/calamares/branding/sentryos/branding.desc
          ---
          componentName: sentryos
          windowExpanding: normal
          windowSize: 800px,520px
          windowPlacement: center
          sidebar: widget
          navigation: widget
          strings:
              productName: SentryOS
              shortProductName: SentryOS
              version: 1.0
              shortVersion: 1.0
              versionedName: SentryOS 1.0
              shortVersionedName: SentryOS 1.0
              bootloaderEntryName: SentryOS
          images:
              productLogo: "logo.png"
              productIcon: "logo.png"
              productWelcome: "logo.png"
          EOF'
          
          sudo sed -i 's/branding: .*/branding: sentryos/g' /tmp/sentryos-root/etc/calamares/settings.conf || true
          
          sudo rm -f /tmp/sentryos-root/usr/share/applications/*calamares*.desktop
          
          # Gunakan Wrapper Installer SentryOS di Desktop Shortcut
          sudo bash -c 'cat <<EOF > /tmp/sentryos-root/usr/share/applications/sentryos-installer.desktop
          [Desktop Entry]
          Type=Application
          Version=1.0
          Name=Install SentryOS
          GenericName=System Installer
          Comment=Install SentryOS to your machine
          Icon=/usr/share/pixmaps/sentryos-logo.png
          Exec=install-sentryos
          Terminal=false
          Categories=Qt;System;
          EOF'
          
          sudo mkdir -p /tmp/sentryos-root/etc/skel/Desktop
          sudo cp /tmp/sentryos-root/usr/share/applications/sentryos-installer.desktop /tmp/sentryos-root/etc/skel/Desktop/
          sudo chmod +x /tmp/sentryos-root/etc/skel/Desktop/sentryos-installer.desktop

      - name: Unmount System Files
        run: |
          sudo rm -f /tmp/sentryos-root/etc/resolv.conf
          sudo umount /tmp/sentryos-root/run
          sudo umount /tmp/sentryos-root/dev/pts
          sudo umount /tmp/sentryos-root/dev
          sudo umount /tmp/sentryos-root/sys
          sudo umount /tmp/sentryos-root/proc

      - name: Siapkan Struktur ISO (Bootloader & Kernel)
        run: |
          sudo mkdir -p /tmp/sentryos-iso/live
          sudo mkdir -p /tmp/sentryos-iso/isolinux
          
          sudo mksquashfs /tmp/sentryos-root /tmp/sentryos-iso/live/filesystem.squashfs -comp xz -b 1M -noappend
          
          if [ -f /tmp/sentryos-root/vmlinuz ] && [ -f /tmp/sentryos-root/initrd.img ]; then
            sudo cp -L /tmp/sentryos-root/vmlinuz /tmp/sentryos-iso/live/vmlinuz
            sudo cp -L /tmp/sentryos-root/initrd.img /tmp/sentryos-iso/live/initrd
          else
            VMLINUZ=$(sudo find /tmp/sentryos-root/boot -maxdepth 1 -name "vmlinuz-*" -type f | head -n 1)
            INITRD=$(sudo find /tmp/sentryos-root/boot -maxdepth 1 -name "initrd.img-*" -type f | head -n 1)
            
            if [ -z "$VMLINUZ" ] || [ -z "$INITRD" ]; then
              echo "Error: Kernel atau Initrd gagal di-build! Direktori /boot kosong."
              sudo ls -la /tmp/sentryos-root/boot
              exit 1
            fi
            
            sudo cp "$VMLINUZ" /tmp/sentryos-iso/live/vmlinuz
            sudo cp "$INITRD" /tmp/sentryos-iso/live/initrd
          fi
          
          sudo cp /usr/lib/ISOLINUX/isolinux.bin /tmp/sentryos-iso/isolinux/
          sudo cp /usr/lib/syslinux/modules/bios/ldlinux.c32 /tmp/sentryos-iso/isolinux/
          
          sudo bash -c 'cat <<EOF > /tmp/sentryos-iso/isolinux/isolinux.cfg
          default linux
          label linux
            kernel /live/vmlinuz
            append initrd=/live/initrd boot=live components quiet splash autologin
          EOF'

      - name: Bungkus Jadi File ISO Matang SentryOS
        run: |
          sudo xorriso -as mkisofs -r -J -joliet-long -l \
            -b isolinux/isolinux.bin -c isolinux/boot.cat \
            -no-emul-boot -boot-load-size 4 -boot-info-table \
            -o sentryos-1.0.iso /tmp/sentryos-iso

      - name: Upload ISO Hasil Rakitan
        uses: actions/upload-artifact@v4
        with:
          name: SentryOS-Slim-ISO
          path: sentryos-1.0.iso
